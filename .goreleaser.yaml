version: 2

project_name: obsidian-preference-sync

builds:
  - id: obsidian-preference-sync
    main: ./cmd/obsidian-preference-sync
    binary: obsidian-preference-sync
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: archives
    ids:
      - obsidian-preference-sync
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

homebrew_casks:
  - name: obsidian-preference-sync
    ids:
      - archives
    binaries:
      - obsidian-preference-sync
    repository:
      owner: tyPhoon-collab
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/tyPhoon-collab/obsidian-preference-sync"
    description: "Synchronize selected Obsidian plugins, plugin settings, and app settings"
    commit_msg_template: "Update obsidian-preference-sync to {{ .Tag }}"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: "{{ .Env.GITHUB_REPOSITORY_OWNER }}"
    name: "{{ .Env.GITHUB_REPOSITORY_NAME }}"
  draft: false
  prerelease: auto
